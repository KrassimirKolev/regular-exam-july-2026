name: CI Quality Gate

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Simulation Tests
      run: |
        if [ -f failing.test ]; then
          echo "Error: Unit tests failed in CI!" && exit 1
        else
          echo "All CI tests passed successfully!"
        fi
